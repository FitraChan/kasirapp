  blue_thermal_printer: ^1.2.3
  infinite_scroll_pagination: ^4.0.0
  month_picker_dialog: ^6.2.1
  currency_text_input_formatter: ^2.3.0
  dio: ^5.9.2
  excel: ^4.0.6
  mobile_scanner: ^5.2.3
  permission_handler: ^12.0.1
  share_plus: ^11.0.0
  

